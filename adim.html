<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Test & Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-6xl mx-auto p-4">
        <h1 class="text-3xl font-bold mb-6 text-center text-purple-600">📊 Registration Test & Admin Panel</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Test Form Section -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-bold mb-4 text-blue-600">🧪 Test Form Submission</h2>
                <form id="testForm" class="space-y-3">
                    <div>
                        <label class="block text-sm font-medium">Full Name</label>
                        <input type="text" id="testName" class="w-full px-3 py-2 border rounded" placeholder="Test User" value="">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Email</label>
                        <input type="email" id="testEmail" class="w-full px-3 py-2 border rounded" placeholder="test@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Phone</label>
                        <input type="text" id="testPhone" class="w-full px-3 py-2 border rounded" placeholder="9999999999">
                    </div>
                    <div>
                        <label class="block text-sm font-medium">Event</label>
                        <input type="text" id="testEvent" class="w-full px-3 py-2 border rounded" placeholder="Web Development">
                    </div>
                    <button type="button" onclick="submitTest()" class="w-full bg-blue-600 text-white py-2 rounded font-semibold hover:bg-blue-700">
                        💾 Submit Test Registration
                    </button>
                </form>
                <div id="testResult" class="mt-4 p-3 rounded hidden"></div>
            </div>

            <!-- Database Status Section -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-bold mb-4 text-green-600">📈 Database Status</h2>
                <button onclick="checkStatus()" class="w-full bg-green-600 text-white py-2 rounded font-semibold hover:bg-green-700 mb-4">
                    🔄 Refresh Status
                </button>
                <div id="statusDiv" class="text-center py-4 text-gray-500">
                    Loading...
                </div>
            </div>
        </div>

        <!-- Recent Registrations -->
        <div class="bg-white rounded-lg shadow-lg p-6 mt-6">
            <h2 class="text-xl font-bold mb-4 text-purple-600">📋 Recent Registrations</h2>
            <div id="registrationsList" class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-100 border-b">
                        <tr>
                            <th class="px-4 py-2 text-left">Name</th>
                            <th class="px-4 py-2 text-left">Email</th>
                            <th class="px-4 py-2 text-left">Phone</th>
                            <th class="px-4 py-2 text-left">Event</th>
                            <th class="px-4 py-2 text-left">Status</th>
                            <th class="px-4 py-2 text-left">Date</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" class="text-center py-4 text-gray-500">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function submitTest() {
            const name = document.getElementById('testName').value || 'Test User ' + new Date().getTime();
            const email = document.getElementById('testEmail').value || 'test' + Date.now() + '@example.com';
            const phone = document.getElementById('testPhone').value || '9999999999';
            const event = document.getElementById('testEvent').value || 'Web Development';

            const data = {
                full_name: name,
                email: email,
                phone: phone,
                technical_event: event,
                total_fee: 500,
                payment_mode: 'UPI',
                submitted_at: new Date().toISOString()
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const resultDiv = document.getElementById('testResult');
                
                if (response.ok && result.success) {
                    resultDiv.className = 'mt-4 p-3 rounded bg-green-100 text-green-700';
                    resultDiv.innerHTML = `✅ Success! Saved with ID: <br><code class="text-xs">${result.registration_id}</code>`;
                } else {
                    resultDiv.className = 'mt-4 p-3 rounded bg-red-100 text-red-700';
                    resultDiv.innerHTML = `❌ Error: ${result.message}`;
                }
                resultDiv.classList.remove('hidden');
                
                setTimeout(() => checkStatus(), 1000);
            } catch (error) {
                const resultDiv = document.getElementById('testResult');
                resultDiv.className = 'mt-4 p-3 rounded bg-red-100 text-red-700';
                resultDiv.innerHTML = `❌ Connection error: ${error.message}`;
                resultDiv.classList.remove('hidden');
            }
        }

        async function checkStatus() {
            try {
                const response = await fetch('/api/health');
                const health = await response.json();
                
                const regResponse = await fetch('/api/registrations');
                const regData = await regResponse.json();

                const statusDiv = document.getElementById('statusDiv');
                statusDiv.className = 'p-4 bg-green-50 rounded border border-green-200';
                statusDiv.innerHTML = `
                    <div class="text-green-700 font-semibold">✅ System Operational</div>
                    <div class="text-sm mt-2">
                        <div>Server: ${health.message}</div>
                        <div>MongoDB: ${health.mongodb}</div>
                        <div class="font-bold mt-2">📊 Total Registrations: <span class="text-2xl text-green-600">${regData.count}</span></div>
                    </div>
                `;

                // Update registrations table
                const tableBody = document.getElementById('tableBody');
                if (regData.data && regData.data.length > 0) {
                    tableBody.innerHTML = regData.data.slice(0, 10).map(reg => `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="px-4 py-2">${reg.full_name}</td>
                            <td class="px-4 py-2"><small>${reg.email}</small></td>
                            <td class="px-4 py-2"><small>${reg.phone}</small></td>
                            <td class="px-4 py-2"><small>${reg.technical_event}</small></td>
                            <td class="px-4 py-2"><span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded">${reg.status}</span></td>
                            <td class="px-4 py-2"><small>${new Date(reg.created_at).toLocaleDateString()}</small></td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                document.getElementById('statusDiv').className = 'p-4 bg-red-50 rounded border border-red-200';
                document.getElementById('statusDiv').innerHTML = `<div class="text-red-700">❌ Connection Error: ${error.message}</div>`;
            }
        }

        // Load on startup
        window.addEventListener('load', checkStatus);
        // Auto-refresh every 5 seconds
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
